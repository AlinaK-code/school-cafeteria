{% extends 'cafeteria/base.html' %}

{% block content %}
<div class="p-5 mb-4 bg-light rounded-3">
    <div class="container-fluid py-5">
        <h1 class="display-5 fw-bold">Добро пожаловать в систему питания!</h1>
        <p class="col-md-8 fs-4">Автоматизированная информационная система школьной столовой.</p>
        {% if user.is_authenticated %}
            <a href="{% url 'cook_dashboard' %}" class="btn btn-primary btn-lg">Перейти в кабинет</a>
        {% else %}
            <p>Пожалуйста, авторизуйтесь через админ-панель.</p>
        {% endif %}
    </div>
</div>
{% endblock %}
